version: 2

models:
  - name: dim_person
    description: >
      Gold person dimension. person_key = sha256(PID).
      One row per person (latest state). FK for all fact tables.
      No reattribution needed because person_key is PID-based.
    columns:
      - name: person_key
        description: "Stable surrogate key derived from PID. Never changes."
        tests:
          - unique
          - not_null
      - name: person_persistent_id
        description: "UUID-style identifier. Assigned once, never changes."
        tests:
          - unique
          - not_null

  - name: fct_booking
    description: >
      Fact table with person_key FK. Joined via bridge on source_key.
      Because person_key is PID-based (not PTK-based), it NEVER needs
      reattribution when identity groups change.
    columns:
      - name: booking_id
        tests:
          - unique
          - not_null
      - name: person_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_person')
              field: person_key
