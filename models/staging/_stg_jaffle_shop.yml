# -- Ex 5.2: Schema tests for staging models --
# -- Ex 7.1: Added dbt_utils.expression_is_true test (requires dbt deps) --
# Tests run with: dbt test --select staging

version: 2

models:
  - name: stg_customers
    description: Staged customer data from the Jaffle Shop app
    columns:
      - name: customer_id
        description: Primary key for customers
        tests:
          - unique
          - not_null

  - name: stg_orders
    description: Staged order data from the Jaffle Shop app
    columns:
      - name: order_id
        description: Primary key for orders
        tests:
          - unique
          - not_null
      - name: status
        description: "{{ doc('order_status') }}"
        tests:
          - accepted_values:
              values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']

  - name: stg_payments
    description: Staged payment data from Stripe
    columns:
      - name: payment_id
        description: Primary key for payments
        tests:
          - unique
          - not_null
      - name: order_id
        description: Foreign key to stg_orders
        tests:
          # Ex 5.4: Relationships test - checks every order_id exists in stg_orders
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: amount
        description: Payment amount in dollars (converted from cents)
        tests:
          # Ex 7.1: dbt_utils test - checks a SQL expression is true for every row
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: payment_method
        description: How the customer paid
        tests:
          # Ex 5.4: Accepted values test on payment methods
          - accepted_values:
              values: ['credit_card', 'coupon', 'bank_transfer', 'gift_card']
