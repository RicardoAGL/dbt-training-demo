# -- Ex 3.1: Source configuration --
# Defines where our raw data lives so we can use {{ source() }} in models
# Run: dbt source freshness  (to check data freshness)

version: 2

sources:
  - name: jaffle_shop
    description: "{{ doc('jaffle_shop') }}"
    schema: main
    tables:
      - name: raw_customers
        description: One record per customer
        columns:
          - name: id
            description: Primary key
            tests:
              - unique
              - not_null

            data_type: INTEGER
            config:
              meta: {}
              tags: []
          - name: first_name
            description: ''
            data_type: VARCHAR
            config:
              meta: {}
              tags: []
          - name: last_name
            description: ''
            data_type: VARCHAR
            config:
              meta: {}
              tags: []
      - name: raw_orders
        description: One record per order
        loaded_at_field: order_date
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        columns:
          - name: id
            description: Primary key
            tests:
              - unique
              - not_null
            data_type: INTEGER
            config:
              meta: {}
              tags: []
          - name: user_id
            description: ''
            data_type: INTEGER
            config:
              meta: {}
              tags: []
          - name: order_date
            description: ''
            data_type: DATE
            config:
              meta: {}
              tags: []
          - name: status
            tests:
              - accepted_values:
                  values: [placed, shipped, completed, return_pending, returned]

            description: ''
            data_type: VARCHAR
            config:
              meta: {}
              tags: []
      - name: raw_payments
        description: One record per payment from Stripe
        columns:
          - name: id
            description: Primary key
            tests:
              - unique
              - not_null
            data_type: INTEGER
            config:
              meta: {}
              tags: []
          - name: order_id
            description: ''
            data_type: INTEGER
            config:
              meta: {}
              tags: []
          - name: payment_method
            description: ''
            data_type: VARCHAR
            config:
              meta: {}
              tags: []
          - name: amount
            description: ''
            data_type: INTEGER
            config:
              meta: {}
              tags: []
